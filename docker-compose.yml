services:
  db:
    image: mariadb:11
    container_name: wp_db_c1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:php8.2-apache
    container_name: wp_app_c1
    restart: unless-stopped
    # DNS public : le resolver Docker interne ne résout pas les domaines externes
    # (ex. API de livraison EcoTrack) sur cette machine.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WP_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_MEMORY_LIMIT', '512M');
    volumes:
      - ./wordpress:/var/www/html
      - ./library:/library:ro
      - ./plugins-dev/aod-cod-form:/var/www/html/wp-content/plugins/aod-cod-form
      - ./plugins-dev/aod-client-dashboard:/var/www/html/wp-content/plugins/aod-client-dashboard

  wpcli:
    image: wordpress:cli-php8.2
    container_name: wp_cli_c1
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./wordpress:/var/www/html
      - ./library:/library:ro
      - ./scripts:/scripts
      - ./plugins-dev/aod-cod-form:/var/www/html/wp-content/plugins/aod-cod-form
      - ./plugins-dev/aod-client-dashboard:/var/www/html/wp-content/plugins/aod-client-dashboard
    entrypoint: ["tail", "-f", "/dev/null"]

  phpmyadmin:
    image: phpmyadmin:5
    container_name: wp_pma_c1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PMA_PORT}:80"
    environment:
      PMA_HOST: db
      UPLOAD_LIMIT: 256M

volumes:
  db_data:
